<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <link rel="preload" as="image" href="assets/assets/images/recrip-icon.webp" type="image/webp" fetchpriority="high">
  <link rel="preload" as="image" href="assets/assets/images/Dashboard.webp" type="image/webp">
  <meta name="description" content="Recrip is a membership and renewal dashboard: track plans, expiring members, and send reminders—built for teams with recurring subscriptions or access.">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://recrip.com/">
  <meta property="og:title" content="Recrip – Memberships, renewals & reminders">
  <meta property="og:description" content="Manage members, plans, renewals, and reminders in one dashboard. Built for subscription teams.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Recrip">
  <link rel="apple-touch-icon" href="recrip-icon.png">

  <!-- Tab / PWA icon: sync with assets/images/recrip-icon.webp (web/recrip-icon.png for HTML link targets) -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="recrip-icon.png"/>

  <title>Recrip – Memberships, renewals & reminders</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Matches lib/main.dart _RecripLogoLoader: soft opacity pulse, #f5f7ff shell */
    #recrip-boot {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7ff;
      margin: 0;
    }
    #recrip-boot-logo {
      width: 112px;
      height: 112px;
      object-fit: contain;
      animation: recrip-boot-pulse 1.4s ease-in-out infinite alternate;
    }
    @keyframes recrip-boot-pulse {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }
  </style>
</head>
<body style="margin:0;background:#f5f7ff;">
  <div id="recrip-boot" aria-busy="true" aria-label="Loading">
    <img
      id="recrip-boot-logo"
      src="assets/assets/images/recrip-icon.webp"
      alt=""
      width="112"
      height="112"
      decoding="async"
      fetchpriority="high"
    />
  </div>
  <script>
    (function () {
      function removeBoot() {
        var el = document.getElementById('recrip-boot');
        if (el) el.remove();
      }
      window.addEventListener('flutter-first-frame', removeBoot);
      window.setTimeout(removeBoot, 30000);
    })();
  </script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    // Bridge for Flutter web: opens Razorpay Checkout and resolves with a JSON string.
    window._rzpCheckoutOpen = function (optionsJson) {
      return new Promise(function (resolve) {
        try {
          var o = JSON.parse(optionsJson);
          o.handler = function (response) {
            resolve(JSON.stringify({
              kind: 'success',
              paymentId: response.razorpay_payment_id,
              orderId: response.razorpay_order_id,
              signature: response.razorpay_signature
            }));
          };
          var rzp = new Razorpay(o);
          rzp.on('payment.failed', function (response) {
            resolve(JSON.stringify({ kind: 'failed', payload: response.error }));
          });
          rzp.on('modal.dismiss', function () {
            resolve(JSON.stringify({ kind: 'dismissed' }));
          });
          rzp.open();
        } catch (e) {
          resolve(JSON.stringify({ kind: 'error', message: String(e) }));
        }
      });
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
